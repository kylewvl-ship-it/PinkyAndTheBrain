# PinkyAndTheBrain Default Configuration
# This file is the canonical source of all default values.
# Do not edit this file. Edit config/pinky-config.yaml instead.

project: PinkyAndTheBrain
version: 0.2.0
runtime: powershell

system:
  vault_root: "./knowledge"
  script_root: "./scripts"
  template_root: "./templates"

folders:
  inbox: "inbox"
  raw: "raw"
  working: "working"
  wiki: "wiki"
  archive: "archive"
  schemas: "schemas"
  reviews: "reviews"
  handoffs: ".ai/handoffs"
  logs: "logs"

file_naming:
  inbox_pattern: "YYYY-MM-DD-HHMMSS-{title}"
  conversation_pattern: "YYYY-MM-DD-HHMMSS-conversation-{service}"
  working_pattern: "{title}"
  wiki_pattern: "{title}"

review_cadence:
  inbox_days: 7
  working_days: 30
  wiki_days: 90

health_checks:
  stale_threshold_months: 6
  min_content_length: 100
  similarity_threshold: 3

ai_handoff:
  max_context_tokens: 3000
  max_wiki_tokens_per_page: 500
  exclude_private: true

projects:
  default_project: "general"
  create_subfolders: true

search:
  max_results: 20
  include_archived: false
  case_sensitive: false

privacy:
  private_excluded_from_handoffs: true
  do_not_promote_blocks_wiki: true

limits:
  max_content_size: 10485760
